name: Compile Check

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      WS_DIR: ${{ github.workspace }}/ws

    steps:
      - name: Check out omron_amr
        uses: actions/checkout@v4
        with:
          path: ws/src/omron_amr
          submodules: recursive

      - name: Set up ROS 2 Jazzy
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Install system tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-colcon-common-extensions python3-rosdep

      - name: Initialize rosdep
        run: |
          sudo rosdep init || true
          rosdep update

      - name: Install package dependencies
        run: |
          rosdep install --from-paths "$WS_DIR/src" --ignore-src --rosdistro jazzy -r -y

      - name: Build workspace
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          cd "$WS_DIR"
          colcon build --event-handlers console_direct+
